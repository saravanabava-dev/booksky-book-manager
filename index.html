<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booksky</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <h1>Booksky</h1>
    </div>

    <div class="container">
 
        <div class="book_container">
            <h2>Example Book</h2>
            <h5>Author Name</h5>
            <p>Short description of the book.</p>
            <button onclick="deletebook(event)">Delete</button>
        </div>
    </div>

    <div class="popup-overlay">
        <div class="popup-box">
            <h2>Add Book</h2>
            <form>
                <input type="text" placeholder="Book Title" id="book-title-input">
                <input type="text" placeholder="Book Author" id="book-author-input">
                <textarea placeholder="Short description" id="book-description-input"></textarea>
                <button type="button" id="add-book">Add</button>
                <button type="button" id="cancel-popup">Cancel</button>
            </form>
        </div>
    </div>

    <button class="add-button" id="add-popup-button">+</button>

    <script src="script.js"></script>

</body> 
</html>
